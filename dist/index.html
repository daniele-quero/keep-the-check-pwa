<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Keep The Check</title>
  <link rel="manifest" href="/manifest.json">
  <script type="module" crossorigin src="/assets/index-DKsjFRpY.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-DD05TGDb.css">
</head>
<body>
  <div id="app">

    <!-- Camera -->
    <section id="camera-section">
      <video id="preview" autoplay playsinline muted></video>
      <div id="camera-mask-top"></div>
      <div id="camera-mask"></div>
      <div id="spinner"></div>
    </section>

    <!-- Coupon Alert -->
    <div id="coupon-alert"></div>

    <!-- Totals -->
    <div id="totals">
      <div id="coupon-section">
        <span class="total-label">Coupons:</span>
        <span class="total-value" id="coupon-value"></span>
      </div>
      <span class="total-label">Total:</span>
      <span class="total-value" id="total-value">0.00 �</span>
    </div>

    <!-- Results -->
    <section id="results">
      <div id="result-list"></div>
    </section>

    <!-- Crop Slider -->
    <section id="slider-section">
      <input type="range" id="crop-slider" min="0" max="1" step="0.01" value="0">
    </section>

    <!-- Bottom Buttons -->
    <section id="actions">
      <button class="action-btn" id="btn-options"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg></button>
      <button class="action-btn" id="btn-add"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <button class="action-btn" id="btn-scan"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
    </section>
  </div>

  <!-- Options Modal -->
  <div class="modal-overlay" id="options-overlay"></div>
  <div class="modal-panel" id="options-panel">
    <h2>Options</h2>
    <div class="modal-3col">
      <div class="field-group">
        <label>AI Client</label>
        <select id="opt-ai"></select>
      </div>
      <div class="field-group">
        <label>OCR Client</label>
        <select id="opt-ocr"></select>
      </div>
      <div class="field-group">
        <label>Currency</label>
        <select id="opt-currency"></select>
      </div>
    </div>
    <div class="modal-row">
      <label>OCR Key:</label>
      <input type="password" id="opt-ocr-key" placeholder="OCR API key" autocomplete="off">
    </div>
    <div class="modal-row">
      <label>AI Key:</label>
      <input type="password" id="opt-ai-key" placeholder="AI API key" autocomplete="off">
    </div>
    <div class="modal-3col">
      <div class="field-group">
        <label>Use Coupons</label>
        <input type="checkbox" id="opt-use-coupons">
      </div>
      <div class="field-group">
        <label>Value</label>
        <input type="number" id="opt-coupon-value" step="0.01" min="0">
      </div>
      <div class="field-group">
        <label>Threshold</label>
        <div style="display:flex;align-items:center;gap:4px;">
          <input type="range" id="opt-threshold" min="0.05" max="0.30" step="0.05">
          <span class="threshold-value" id="opt-threshold-value">20%</span>
        </div>
      </div>
    </div>
    <div class="modal-row import-row">
      <label>Import:</label>
      <input type="file" id="opt-import" accept=".yml,.yaml">
    </div>
    <div class="modal-buttons">
      <button class="modal-btn" id="opt-export" title="Export config"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
      <button class="modal-btn" id="opt-ok"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
      <button class="modal-btn" id="opt-cancel"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  </div>

  <!-- Add Item Modal -->
  <div class="modal-overlay" id="add-overlay"></div>
  <div class="modal-panel" id="add-panel">
    <h2>Add an Item</h2>
    <div class="modal-row">
      <label>Product Name:</label>
      <textarea id="add-product" rows="2" placeholder="Enter product name..."></textarea>
    </div>
    <div class="modal-row">
      <label>Price:</label>
      <input type="number" id="add-price" step="0.01" min="0" max="999999" placeholder="0.00">
    </div>
    <div class="modal-buttons">
      <button class="modal-btn" id="add-ok"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
      <button class="modal-btn" id="add-cancel"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  </div>

</body>
</html>
