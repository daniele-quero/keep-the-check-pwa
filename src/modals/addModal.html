<div class="modal-overlay" id="add-overlay"></div>
<div class="modal-panel" id="add-panel">
  <h2 id="add-title">Add an Item</h2>

  <div id="add-ai-status" class="add-ai-status" hidden>
    <span class="add-ai-spinner" aria-hidden="true"></span>
    <span id="add-ai-status-text">Analisi IA in corso…</span>
  </div>

  <div id="add-ai-results" class="add-ai-results" hidden>
    <div class="modal-row">
      <label for="add-ai-product">Prodotto:</label>
      <input type="text" id="add-ai-product" placeholder="Nome prodotto">
    </div>
    <table class="add-ai-table">
      <thead>
        <tr>
          <th></th>
          <th>Prezzo</th>
          <th>Valuta</th>
          <th>Tipo</th>
          <th>Conf.</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="add-ai-rows"></tbody>
    </table>
    <div class="modal-buttons">
      <button type="button" class="modal-btn" id="btn-ai-confirm">Conferma e salva</button>
      <button type="button" class="modal-btn" id="btn-ai-manual-fallback">Inserimento manuale</button>
    </div>
  </div>

  <div id="add-manual-region" class="add-manual-region">
    <div class="modal-row">
      <label>Product Name:</label>
      <textarea id="add-product" rows="2" placeholder="Enter product name..."></textarea>
    </div>
    <div class="modal-row">
      <label>Price:</label>
      <input type="number" id="add-price" step="0.01" min="0" max="999999" placeholder="0.00">
    </div>
    <div class="modal-row add-qty-row">
      <label>Qty:</label>
      <div class="add-qty-controls">
        <button type="button" class="add-qty-btn" id="add-qty-minus">&#8722;</button>
        <span id="add-qty-display">1</span>
        <button type="button" class="add-qty-btn" id="add-qty-plus">+</button>
      </div>
    </div>
    <div class="modal-buttons">
      <button class="modal-btn" id="add-ok"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></button>
      <button class="modal-btn" id="add-cancel"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  </div>
</div>
